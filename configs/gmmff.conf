# /etc/nginx/conf.d/gmmff.conf
#
# gmmff signaling server — nginx reverse proxy
#
# Assumes:
#   - gmmff is listening on 127.0.0.1:8080 (GMMFF_ADDR=:8080)
#   - TLS is terminated here at nginx (recommended)
#   - Certbot / Let's Encrypt has already issued a certificate
#
# Enable:
#   sudo nginx -t
#   sudo systemctl reload nginx

# ── Upstream ──────────────────────────────────────────────────────────────────

upstream gmmff_backend {
  server 127.0.0.1:8080;
  # Keep a pool of connections to the backend so nginx does not open a new
  # TCP connection for every WebSocket upgrade.
  keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name your.domain.com;

    # Let's Encrypt ACME challenge — must be reachable over plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else redirects to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name your.domain.com;

    # Let's Encrypt Cert location
    ssl_certificate     /etc/letsencrypt/live/your.domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your.domain.com/privkey.pem;

    # Modern TLS only — drops IE11 and very old Android.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security Headers
    add_header Referrer-Policy                   "no-referrer"       always;
    add_header X-Content-Type-Options            "nosniff"           always;
    add_header X-Frame-Options                   "SAMEORIGIN"        always; # Or DENY
    add_header X-Permitted-Cross-Domain-Policies "none"              always;
    add_header X-Robots-Tag                      "noindex, nofollow" always;
    add_header X-XSS-Protection                  "1; mode=block"     always;
    add_header Permissions-Policy                "geolocation=(self), midi=(self), sync-xhr=(self), microphone=(self), camera=(self), magnetometer=(self), gyroscope=(self), fullscreen=(self), payment=(self), interest-cohort=()";
    #add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always; # Only enable this when you are ready!

    # Logging
    # Privacy: log only method, URI, status, and response size.
    # No $remote_addr, no $http_user_agent, no $http_referer.
    log_format gmmff_privacy '$time_iso8601 $request_method $uri $status $body_bytes_sent';
    access_log /var/log/nginx/gmmff_access.log gmmff_privacy;
    error_log  /var/log/nginx/gmmff_error.log warn;
    # Or, disable logging altogether
    #access_log off;
    #error_log /dev/null crit;

    # WebSocket endpoint
    location /ws {
        proxy_pass http://gmmff_backend;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward the real host so gmmff logs have context.
        proxy_set_header Host $host;

        # Do NOT forward the real IP — gmmff is privacy-focused and does not
        # log or use client IPs.  Omitting X-Real-IP and X-Forwarded-For is
        # intentional.

        # WebSocket connections are long-lived.  Set generous timeouts so nginx
        # does not close an idle-but-connected peer.
        # pongWait in gmmff is 60s, so 90s here gives comfortable headroom.
        proxy_read_timeout  90s;
        proxy_send_timeout  90s;
        proxy_connect_timeout 10s;

        # Disable proxy response buffering — WebSocket frames must flow through
        # immediately, not be held in a buffer.
        proxy_buffering off;

        # Limit frame size from clients to match gmmff's maxMessageBytes (64 KiB).
        # Protects against oversized frames reaching the backend.
        proxy_buffers 8 64k;
        proxy_busy_buffers_size 64k;
        proxy_buffer_size 64k;

        # Disable caching for the WebSocket endpoint.
        proxy_cache off;
    }

    # Health and metrics endpoints
    location /healthz {
        proxy_pass http://gmmff_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # These endpoints are lightweight — short timeouts are appropriate.
        proxy_read_timeout 5s;
        proxy_connect_timeout 3s;

        # Restrict to localhost and private ranges if you want to prevent
        # public access to the health endpoint.
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    location /readyz {
        proxy_pass http://gmmff_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 5s;
        proxy_connect_timeout 3s;
    }

    location /metrics {
        proxy_pass http://gmmff_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 5s;
        proxy_connect_timeout 3s;

        # Metrics should not be publicly accessible in production.
        # Uncomment and adjust to restrict to your monitoring system's IP.
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # Landing page (make wasm)
    # If not using wasm, you can use the default page or deny all instead
    location / {
        # 1. Try serving as a file
        # 2. Try serving as a directory
        # 3. Fallback to @proxy named location
        try_files $uri $uri/ @proxy;
    }

    location @proxy {
        proxy_pass http://gmmff_backend;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    # Block everything else
    # gmmff only exposes /ws, /healthz, /readyz, /metrics, and /.
    # Anything else gets a 444 (faster but confusing, change to 404 if you want) from nginx before it reaches the backend.
    location ~* \.(php|asp|aspx|jsp|cgi|go|env|mod|sum|yaml|yml|md|gitignore|git|github)$ {
        return 444;
    }
}
