services:
  # Cache/store. Redis by default; Valkey is a wire-compatible drop-in.
  # To use Valkey instead, set in stack.env:
  #   GMMFF_CACHE_IMAGE=valkey/valkey:8-alpine
  #   GMMFF_CACHE_SERVER=valkey-server
  # The service stays named "redis" so GMMFF_REDIS_URL=redis://redis:6379 works
  # for either backend; the server flags are identical for both.
  redis:
    image: ${GMMFF_CACHE_IMAGE:-redis:8-alpine}
    container_name: gmmff-redis
    mem_limit: 92M
    restart: unless-stopped
    command: >
      ${GMMFF_CACHE_SERVER:-redis-server}
        --save 60 1
        --loglevel warning
        --maxmemory 64mb
        --maxmemory-policy allkeys-lru
    volumes:
      - ${CONFIG}/redis:/data
    healthcheck:
      # Works on both images: whichever CLI exists answers; the other is skipped.
      test: ["CMD-SHELL", "redis-cli ping || valkey-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  gmmff:
    image: ghcr.io/iamdoubz/gmmff:latest
    container_name: gmmff
    mem_limit: 64M
    restart: unless-stopped
    env_file:
      - stack.env
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ${CONFIG}/encrypted:/data/schedule/complete
      - /dev/shm:/data/schedule/pending
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s