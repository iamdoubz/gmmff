services:
  redis:
    image: redis:8-alpine
    name: gmmff-redis
    mem_limit: 128M
    restart: unless-stopped
    command: >
      redis-server
        --save 60 1
        --loglevel warning
        --maxmemory 64mb
        --maxmemory-policy allkeys-lru
        --requirepass "${GMMFF_REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    # Redis is NOT exposed to the host network — only gmmff can reach it.
    # Expose 6379 here only for local debugging (remove in production).
    ports:
      - "127.0.0.1:6379:6379"

  gmmff:
    image: ghcr.io/iamdoubz/gmmff:latest
    name: gmmff
    mem_limit: 256M
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - GMMFF_ADDR=${GMMFF_ADDR:-:8080}
      - GMMFF_REDIS_URL=redis://:${GMMFF_REDIS_PASSWORD}@redis:6379/0
      - GMMFF_LOG_LEVEL=info
    ports:
      - "8080${GMMFF_ADDR:-:8080}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  redis_data:
