version: "3.9"

services:
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: >
      redis-server
        --save 60 1
        --loglevel warning
        --maxmemory 64mb
        --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    # Redis is NOT exposed to the host network — only gmmff can reach it.
    # Expose 6379 here only for local debugging (remove in production).
    ports:
      - "127.0.0.1:6379:6379"

  gmmff:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      GMMFF_ADDR:       ":8080"
      GMMFF_REDIS_URL:  "redis://redis:6379/0"
      GMMFF_LOG_LEVEL:  "info"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  redis_data:
