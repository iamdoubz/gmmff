services:
  # Cache/store. Redis by default; Valkey is a wire-compatible drop-in.
  # To use Valkey instead, set these in your shell or project-root .env:
  #   GMMFF_CACHE_IMAGE=valkey/valkey:8-alpine
  #   GMMFF_CACHE_SERVER=valkey-server
  # The service is intentionally named "redis" so GMMFF_REDIS_URL=redis://redis:6379
  # keeps working for either backend. The server flags are identical for both.
  redis:
    image: ${GMMFF_CACHE_IMAGE:-redis:8-alpine}
    container_name: gmmff-redis
    mem_limit: 92M
    restart: unless-stopped
    command: >
      ${GMMFF_CACHE_SERVER:-redis-server}
        --save 60 1
        --loglevel warning
        --maxmemory 64mb
        --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      # Works on both images: whichever CLI exists answers; the other is skipped.
      test: ["CMD-SHELL", "redis-cli ping || valkey-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 3
  gmmff:
    image: ghcr.io/iamdoubz/gmmff:latest
    container_name: gmmff
    mem_limit: 64M
    restart: unless-stopped
    env_file:
      - configs/.env
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    # If using Schedule, uncomment volumes
    #volumes:
    #  - gmmff_data:${GMMFF_SCHEDULE_DIR}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 1
      start_period: 5s
  # ── gmmff local (no signaling server, no Redis, LAN-only mode) ───────────
  # Usage: docker compose --profile local up gmmff-local
  # The --health-port 8081 flag starts a plain HTTP /healthz listener
  # alongside the TLS server so Docker can healthcheck it.
  gmmff-local:
    image: ghcr.io/iamdoubz/gmmff:latest
    container_name: gmmff-local
    mem_limit: 64M
    restart: unless-stopped
    network_mode: host
    profiles:
      - local
    command: ["/gmmff", "local", "--health-port", "8081"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 8s
volumes:
  redis_data:
  gmmff_data:
