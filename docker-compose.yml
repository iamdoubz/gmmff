services:
  redis:
    image: redis:8-alpine
    container_name: gmmff-redis
    mem_limit: 92M
    restart: unless-stopped
    command: >
      redis-server
        --save 60 1
        --loglevel warning
        --maxmemory 64mb
        --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
  gmmff:
    image: ghcr.io/iamdoubz/gmmff:latest
    container_name: gmmff
    mem_limit: 64M
    restart: unless-stopped
    env_file:
      - configs/.env
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 1
      start_period: 5s

volumes:
  redis_data:
