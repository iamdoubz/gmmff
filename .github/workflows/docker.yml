name: Docker

on:
  release:
    types: [published] # publish on version tags: v1.0.0, v1.2.3, etc.
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}  # iamdoubz/gmmff

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Go Wasm environment
        run: |
          GOROOT=$(go env GOROOT)
          echo "GOROOT=$GOROOT" >> $GITHUB_ENV

      - name: Build Wasm
        run: make wasm

      - name: Build binary for Docker
        run: |
          mkdir -p internal/localmode/static
          cp -rf web/static/. internal/localmode/static/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
          build-args: |
            BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            APP_VERSION={{version}}
            APP_COMMIT=${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotation: index:org.opencontainers.image.description="Fast, secure, private, simple open source file transfer and messaging application"
          cache-from: type=gha
          cache-to: type=gha,mode=max