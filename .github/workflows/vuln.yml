name: Vuln Scan

on:
  pull_request:

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod # honors the toolchain directive (go1.26.5)
          cache: true

      - name: govulncheck (native + Wasm)
        run: make vuln
