name: Vuln Scan

on:
  push:
  pull_request:
  schedule:
    - cron: '0 6 * * 1' # weekly Monday 06:00 UTC — catch newly-disclosed CVEs
  workflow_dispatch:

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod # honors the toolchain directive (go1.26.5)
          cache: true

      - name: govulncheck (native + Wasm)
        run: make vuln
